spring:
  application:
    name: api-gateway

  cloud:
    config:
      enabled: false

    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:9898
          predicates:
            - Path=/api/v1/auth/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "http://localhost:3000"
            allowed-methods: "GET, POST, PUT, DELETE, OPTIONS"
            allowed-headers: "Content-Type, Authorization, Accept, Origin, X-Requested-With"
            allowed-credentials: true
            max-age: 3600

#  eureka:
#    client:
#      service-url:
#        defaultZone: http://localhost:8761/eureka/

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 9191