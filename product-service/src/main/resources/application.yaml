spring:
  application:
    name: product-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: product
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    topic:
      name: product-topic
    create-order-topic:
      name: create-order-topic

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/product_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Nnn@2002}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    timeout: ${SPRING_REDIS_TIMEOUT:60000}

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 15MB

  zipkin:
    base-url: http://127.0.0.1:9411/

  sleuth:
    sampler:
      probability: 1

  cloud:
    openfeign:
      cache:
        enabled: false

server:
  port: 9088

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dzhvltob2}
  api-key: ${CLOUDINARY_API_KEY:552733925718967}
  api-secret: ${CLOUDINARY_API_SECRET:Ik83pnG9Dk1m124v5p5OTgSakys}

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1